<!DOCTYPE html>
<html lang="en-us">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Add products or animals to the inventory using this form.">
    <title>Add Animal - Gratis Jacob</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="css/style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script defer src="./app/animal.service.mock.js"></script>
    <script defer src="./app/add.js"></script>
</head>

<body class="d-flex flex-column h-100">
    <header class="d-flex justify-content-center py-3">
        <ul class="nav nav-pills">
            <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
            <li class="nav-item"><a href="add.html" class="nav-link active">Add Animal</a></li>
            <li class="nav-item"><a href="list.html" class="nav-link">Show Items</a></li>
            <li class="nav-item"><a href="contact.html" class="nav-link">Contact</a></li>
            <li class="nav-item"><a href="about.html" class="nav-link">About</a></li>
        </ul>
    </header>

    <main class="container my-5">
        <h2 class="text-center my-5">Add Animal</h2>
        <form id="animal-form" class="needs-validation" novalidate>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="Animal Name" class="form-label">Animal Name</label>
                    <input type="text" class="form-control" id="Animal Name" name="name" required>
                    <div class="invalid-feedback">This field is required.</div>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="animal-Breed" class="form-label">Breed</label>
                    <input type="text" class="form-control" id="animal-Breed" name="breed" required>
                    <div class="invalid-feedback">This field is required.</div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="animal-eyes" class="form-label">Animal Eyes</label>
                    <input type="number" class="form-control" id="animal-eyes" name="eyes" required>
                    <div class="invalid-feedback">This field is required.</div>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="animal-legs" class="form-label">Legs</label>
                    <textarea class="form-control" id="animal-legs" name="legs" rows="3" required></textarea>
                    <div class="invalid-feedback">This field is required.</div>
                </div>
            </div>
            <div class="mb-3">
                <label for="animal-sound" class="form-label">Animal Sound</label>
                <input type="text" class="form-control" id="animal-sound" name="sound" required>
                <div class="invalid-feedback">This field is required.</div>
            </div>
            <button type="submit" class="btn btn-primary">Save Animal</button>
        </form>
    </main>

    <footer class="mt-auto py-3 border-top">
        <div class="container d-flex justify-content-between">
            <span>© <span id="copyrightYear"></span> Gratis Jacob, Inc</span>
            <ul class="nav list-unstyled d-flex">
                <li class="ms-3"><a href="#"><i class="fab fa-twitter"></i></a></li>
                <li class="ms-3"><a href="#"><i class="fab fa-instagram"></i></a></li>
                <li class="ms-3"><a href="#"><i class="fab fa-facebook"></i></a></li>
            </ul>
        </div>
    </footer>

    <script>
        document.getElementById('copyrightYear').textContent = new Date().getFullYear();
    </script>
</body>

</html>
